name: Auto Build Buddy
on:
  push:
    branches: [ main, master ] # Trigger on every save to these branches
  workflow_dispatch:          # Keep manual button as backup

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Buildozer
        run: pip install buildozer cython kivy
      - name: Run Build
        run: |
          # This command builds the APK in the cloud
          buildozer android debug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DeskBuddy-APK
          path: bin/*.apk
