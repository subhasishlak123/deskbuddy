name: Build Llama APK
on:
  workflow_dispatch: # Allows manual trigger
  push:
    branches: [ main ] # Auto-builds when you save to main

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive # Crucial: downloads the C++ engine core

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build APK
        run: |
          cd examples/llama.android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: llama-android-app
          path: examples/llama.android/app/build/outputs/apk/debug/*.apk
