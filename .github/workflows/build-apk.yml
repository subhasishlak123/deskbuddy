name: Build Anime Buddy APK

# Controls when the workflow will run
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the code from your repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up Java 17 (Required for modern Android/Gradle)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # 3. Grant execute permission for the Gradle wrapper
      # This prevents the "Permission Denied" error
      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      # 4. Build the Debug APK
      # This will compile your Kotlin code and generate the .apk file
      - name: Build with Gradle
        run: ./gradlew assembleDebug

      # 5. Upload the resulting APK as a GitHub Artifact
      # You can download this from the "Actions" tab once finished
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AnimeBuddy-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
