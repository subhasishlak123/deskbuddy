name: Build Buddy APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt update
          # Using the most stable generic package names for Ubuntu 24.04
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses-dev cmake libffi-dev libssl-dev libltdl-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Buildozer & Cython
        run: |
          pip install --upgrade pip
          # --break-system-packages is required for PEP 668 compliance in 2026
          pip install --break-system-packages "cython<3.0.0" buildozer 

      - name: Run Buildozer
        run: |
          # Automatically accept SDK licenses to prevent the build from hanging
          yes | buildozer android debug
        env:
          # NDK r25c is the gold standard for stability on this setup
          ANDROID_NDK_HOME: ${HOME}/.buildozer/android/platform/android-ndk-r25c

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DeskBuddy-App
          path: bin/*.apk
