name: Build Buddy APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt update
          # Updated for Ubuntu 24.04+ (using libncurses6 and libtinfo6)
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses6-dev libncursesw6-dev libtinfo6 cmake libffi-dev libssl-dev libltdl-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Buildozer & Cython
        run: |
          pip install --upgrade pip
          # Added flag to bypass 'externally-managed-environment' error on newer Linux
          pip install --break-system-packages "cython<3.0.0" buildozer 

      - name: Run Buildozer
        run: |
          # 'yes' automatically clicks "Accept" on Android SDK licenses
          yes | buildozer android debug
        env:
          # Ensures it uses a stable NDK version for 2026
          ANDROID_NDK_HOME: ${HOME}/.buildozer/android/platform/android-ndk-r25c

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DeskBuddy-App
          path: bin/*.apk
